name: bookinman
description: BookinMan — offline-first Loan & CRM management app for iOS and Android.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  flutter_riverpod: ^2.5.1
  isar: ^3.1.0
  isar_flutter_libs: ^3.1.0
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.1.0
  google_sign_in: ^6.2.1
  go_router: ^14.2.0
  flutter_local_notifications: ^17.2.1
  url_launcher: ^6.3.0
  intl: ^0.19.0
  connectivity_plus: ^6.0.3
  path_provider: ^2.1.2
  uuid: ^4.4.0
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  isar_generator: ^3.1.0
  mockito: ^5.4.4
  fake_async: ^1.2.0

flutter:
  uses-material-design: true
