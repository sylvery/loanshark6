name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.22.x"
          channel: stable

      - name: "[1/4] Install dependencies"
        run: flutter pub get

      - name: "[2/4] Generate Isar models"
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: "[3/4] Static analysis"
        run: flutter analyze

      - name: "[4/4] Unit tests"
        run: flutter test
